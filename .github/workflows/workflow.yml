name: Build and release

on:
  push:
    branches:
      - '*'
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev libglib2.0-dev libgtk-3-dev libpango1.0-dev libatk1.0-dev libgdk-pixbuf-2.0-dev libcairo2-dev libxdo-dev libxdo3 libwayland-dev libegl1-mesa-dev libxkbcommon-dev wget

      - name: Install appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          sudo mv appimagetool /usr/local/bin/appimagetool

      - name: Install AppImage tool
        run: cargo install cargo-appimage

      - name: Build AppImage
        run: |
          cp resources/icon.png icon.png
          cargo appimage
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
          APPIMAGE_LINUXDEPLOY_EXTRA_ARGS: "--library /usr/lib/x86_64-linux-gnu/libxdo.so.3"

      - name: Get version
        id: get_version
        run: echo "VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')" >> $GITHUB_OUTPUT

      - name: Rename AppImage
        run: |
          appimage_path=$(find target -name '*.AppImage' | head -n 1)
          mv "$appimage_path" target/release/keypeek-v${{ steps.get_version.outputs.VERSION }}-linux-x86_64.AppImage

      - name: Attest build provenance
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: target/release/keypeek-v${{ steps.get_version.outputs.VERSION }}-linux-x86_64.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: target/release/keypeek-v${{ steps.get_version.outputs.VERSION }}-linux-x86_64.AppImage

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Get version
        id: get_version
        run: |
          $version = (cargo metadata --no-deps --format-version 1 | ConvertFrom-Json).packages[0].version
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Rename binary
        run: move target/release/keypeek.exe target/release/keypeek-v${{ steps.get_version.outputs.VERSION }}-windows.exe

      - name: Attest build provenance
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: target/release/keypeek-v${{ steps.get_version.outputs.VERSION }}-windows.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: target/release/keypeek-v${{ steps.get_version.outputs.VERSION }}-windows.exe

  build-macos:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      matrix:
        include:
          - os: macos-26
            target: aarch64-apple-darwin
            arch: arm64
          - os: macos-26-intel
            target: x86_64-apple-darwin
            arch: x86_64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install bundle tool
        run: cargo install cargo-bundle

      - name: Build app bundle
        run: cargo bundle --release --target ${{ matrix.target }}

      - name: Get version
        id: get_version
        run: echo "VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')" >> $GITHUB_OUTPUT

      - name: Build ZIP
        run: |
          app_path=$(find target/${{ matrix.target }}/release/bundle/osx -name '*.app' | head -n 1)
          zip_path="target/release/keypeek-v${{ steps.get_version.outputs.VERSION }}-macos-${{ matrix.arch }}.zip"
          ditto -c -k --sequesterRsrc --keepParent "$app_path" "$zip_path"

      - name: Attest build provenance
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: target/release/keypeek-v${{ steps.get_version.outputs.VERSION }}-macos-${{ matrix.arch }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: target/release/keypeek-v${{ steps.get_version.outputs.VERSION }}-macos-${{ matrix.arch }}.zip

  create-release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos]
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-appimage
          path: ./artifacts

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-binary
          path: ./artifacts

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          pattern: macos-*
          path: ./artifacts
          merge-multiple: true

      - name: Create release draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            ./artifacts/* \
            --draft \
            --title "${{ github.ref_name }}"
